<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - HealthCare Portal</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(135deg, #0d6efd 0%, #084298 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        padding: 40px 0;
      }
      .register-card {
        border-radius: 20px;
        border: none;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        overflow: hidden;
      }
      .register-header {
        background: linear-gradient(135deg, #0d6efd, #084298);
        padding: 30px;
        text-align: center;
        color: white;
      }
      .form-control, .form-select {
        border-radius: 10px;
        padding: 12px 15px;
        border: 1px solid #dee2e6;
        background-color: #f8f9fa;
      }
      .form-control:focus, .form-select:focus {
        background-color: #fff;
        box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.15);
        border-color: #0d6efd;
      }
      .input-group-text {
        border-radius: 10px 0 0 10px;
        background-color: #f8f9fa;
        border: 1px solid #dee2e6;
        border-right: none;
        color: #6c757d;
      }
      .btn-register {
        border-radius: 10px;
        padding: 12px;
        font-weight: 600;
        font-size: 1.1rem;
        transition: all 0.3s;
      }
      .btn-register:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }
      .section-title {
        font-size: 0.9rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #0d6efd;
        margin-bottom: 20px;
        border-bottom: 2px solid #f0f2f5;
        padding-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">
          <div class="card register-card">
            <div class="register-header">
              <i class="fas fa-heartbeat fa-3x mb-3"></i>
              <h4 class="fw-bold mb-1">HealthCare Portal</h4>
              <p class="opacity-75 mb-0">Join our healthcare network</p>
            </div>
            <div class="card-body p-4 p-md-5">
              {% if messages %}
                {% for message in messages %}
                  <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                  </div>
                {% endfor %}
              {% endif %}

              <form method="post">
                {% csrf_token %}
                
                <div class="row g-4">
                  <div class="col-12">
                    <h6 class="section-title"><i class="fas fa-user-circle me-2"></i>Personal Information</h6>
                  </div>
                  
                  <div class="col-md-6">
                    <label class="form-label fw-semibold small">First Name</label>
                    <div class="input-group">
                      <span class="input-group-text"><i class="fas fa-user"></i></span>
                      <input type="text" name="first_name" class="form-control" placeholder="Enter first name" required>
                    </div>
                  </div>
                  
                  <div class="col-md-6">
                    <label class="form-label fw-semibold small">Last Name</label>
                    <div class="input-group">
                      <span class="input-group-text"><i class="fas fa-user"></i></span>
                      <input type="text" name="last_name" class="form-control" placeholder="Enter last name" required>
                    </div>
                  </div>

                  <div class="col-md-6">
                    <label class="form-label fw-semibold small">Email Address</label>
                    <div class="input-group">
                      <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                      <input type="email" name="email" class="form-control" placeholder="example@health.com" required>
                    </div>
                  </div>

                  <div class="col-md-6">
                    <label class="form-label fw-semibold small">Phone Number</label>
                    <div class="input-group">
                      <span class="input-group-text"><i class="fas fa-phone"></i></span>
                      <input type="text" name="phone" class="form-control" placeholder="Enter phone number">
                    </div>
                  </div>

                  <div class="col-12 mt-5">
                    <h6 class="section-title"><i class="fas fa-key me-2"></i>Account Security</h6>
                  </div>

                  <div class="col-md-6">
                    <label class="form-label fw-semibold small">Username</label>
                    <div class="input-group">
                      <span class="input-group-text"><i class="fas fa-at"></i></span>
                      <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
                    </div>
                  </div>

                  <div class="col-md-6">
                    <label class="form-label fw-semibold small">Portal Role</label>
                    <div class="input-group">
                      <span class="input-group-text"><i class="fas fa-user-tag"></i></span>
                      <select name="role" class="form-select" required>
                        <option value="" selected disabled>Select Role</option>
                        <option value="patient">Patient</option>
                        <option value="doctor">Doctor</option>
                        <option value="staff">Staff</option>
                        <option value="admin">Admin</option>
                      </select>
                    </div>
                  </div>

                  <div class="col-md-6">
                    <label class="form-label fw-semibold small">Password</label>
                    <div class="input-group">
                      <span class="input-group-text"><i class="fas fa-lock"></i></span>
                      <input type="password" name="password1" class="form-control" placeholder="Create password" required>
                    </div>
                  </div>

                  <div class="col-md-6">
                    <label class="form-label fw-semibold small">Confirm Password</label>
                    <div class="input-group">
                      <span class="input-group-text"><i class="fas fa-check-double"></i></span>
                      <input type="password" name="password2" class="form-control" placeholder="Repeat password" required>
                    </div>
                  </div>

                  <div class="col-12 text-center mt-5">
                    <button type="submit" class="btn btn-primary btn-register px-5 w-100 mb-3">
                      <i class="fas fa-user-check me-2"></i>Create My Account
                    </button>
                    <p class="text-muted small">
                      By registering, you agree to our Terms of Service.
                    </p>
                    <hr>
                    <p class="mb-0 text-muted">
                      Already registered? <a href="{% url 'login' %}" class="text-primary fw-bold text-decoration-none">Sign In</a>
                    </p>
                    <p class="mt-2">
                       <a href="{% url 'home' %}" class="text-muted small text-decoration-none"><i class="fas fa-arrow-left me-1"></i>Back to Home</a>
                    </p>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
